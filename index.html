<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎂 Happy Birthday 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow-x:hidden;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#7c3aed);
color:white;
text-align:center;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

h1{
font-size:60px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 10px #fff;
}
to{
text-shadow:0 0 30px #ff69b4;
}
}

.subtitle{
margin-top:20px;
font-size:22px;
}

button{
margin-top:35px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:50px;
cursor:pointer;
background:#ff4081;
color:white;
transition:.3s;
}

button:hover{
transform:scale(1.1);
background:#ff1493;
}

.message{
margin-top:30px;
font-size:28px;
display:none;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.balloon{
position:fixed;
bottom:-120px;
width:70px;
animation:float 10s linear infinite;
z-index:-1;
}

@keyframes float{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-120vh);
}
}

.gallery{
padding:60px 20px;
}

.gallery h2{
margin-bottom:30px;
}

.photos{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.photos img{
width:220px;
height:220px;
object-fit:cover;
border-radius:20px;
transition:.5s;
box-shadow:0 0 20px rgba(255,255,255,.3);
}

.photos img:hover{
transform:rotateY(15deg) scale(1.08);
}

.footer{
padding:60px;
font-size:28px;
}

</style>

</head>
<body>

<div class="hero">

<h1>🎂 Happy Birthday! 🎂</h1>

<p class="subtitle">Wishing you happiness, success and lots of smiles ❤️</p>

<button onclick="surprise()">
🎁 Open Surprise
</button>

<div class="message" id="msg">
🎉 Have an Amazing Birthday! 🎂❤️<br><br>
May all your dreams come true!
</div>

</div>

<div class="gallery">

<h2>📸 Our Memories</h2>

<div class="photos">

<img src="https://picsum.photos/300?1">
<img src="https://picsum.photos/300?2">
<img src="https://picsum.photos/300?3">

</div>

</div>

<div class="footer">

❤️ Thank You For Being My Friend ❤️

</div>

<audio id="music">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

function surprise(){

document.getElementById("msg").style.display="block";

document.getElementById("music").play();

confetti({
particleCount:250,
spread:180,
origin:{y:0.6}
});

}

for(let i=0;i<18;i++){

let b=document.createElement("div");

b.className="balloon";

b.innerHTML="🎈";

b.style.left=Math.random()*100+"vw";

b.style.animationDuration=(6+Math.random()*6)+"s";

b.style.fontSize=(30+Math.random()*40)+"px";

document.body.appendChild(b);

}

setInterval(()=>{

confetti({
particleCount:120,
spread:150
});

},12000);

</script>

</body>
</html>
